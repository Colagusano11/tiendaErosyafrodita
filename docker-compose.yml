services:
  # Base de Datos para Tienda Principal
  db:
    image: mysql:8.0
    container_name: tienda-mysql-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: tienda_db
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Base de Datos para Microservicio de Usuarios
  db-usuarios:
    image: mysql:8.0
    container_name: db-usuarios
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_USUARIOS_PASSWORD:-sasa1234}
      MYSQL_DATABASE: tienda_usuarios
    volumes:
      - db_usuarios_data:/var/lib/mysql
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Microservicio de Usuarios
  mcsv-usuario:
    build:
      context: ./mcsv-usuario
      dockerfile: Dockerfile
    image: mcsv-usuario:latest
    container_name: mcsv-usuario
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-usuarios:3306/tienda_usuarios
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_USUARIOS_PASSWORD:-sasa1234}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APPLICATION_SECURITY_JWT_SECRET_KEY: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
    depends_on:
      db-usuarios:
        condition: service_healthy
    networks:
      - app-net

  # Backend Principal (Tienda)
  app:
    build:
      context: ./tiendaBack
      dockerfile: Dockerfile
    image: tiendaonline:latest
    container_name: tienda-app-server
    ports:
      - "${BACKEND_PORT:-8082}:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/tienda_db
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_CLOUD_CONFIG_ENABLED: "false"
      SPRING_CLOUD_CONFIG_IMPORT-CHECK_ENABLED: "false"
      SPRING_CONFIG_IMPORT: "optional:configserver:"
      JWT_SECRET: ${JWT_SECRET}
      APPLICATION_SECURITY_JWT_SECRET_KEY: ${JWT_SECRET}
      NOVAENGEL_USER: ${NOVAENGEL_USER}
      NOVAENGEL_PASSWORD: ${NOVAENGEL_PASSWORD}
      BTS_API_JWT: ${BTS_API_JWT}
      REVOLUT_API_KEY: ${REVOLUT_API_KEY}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      REVOLUT_API_URL: "https://merchant.revolut.com/api/1.0"
      FRONTEND_URL: ${FRONTEND_URL:-https://erosyafrodita.com}
      APP_FRONTEND_URL: ${FRONTEND_URL:-https://erosyafrodita.com}
      CONFIG_BASEURL_ENDPOINT_MCSV_USUARIO: "http://mcsv-usuario:8080"
      SPRING_CLOUD_LOADBALANCER_ENABLED: "true"
      SPRING_CLOUD_DISCOVERY_CLIENT_SIMPLE_INSTANCES_MCSV_USUARIO_0_URI: "http://mcsv-usuario:8080"
    depends_on:
      db:
        condition: service_healthy
      mcsv-usuario:
        condition: service_started
    networks:
      - app-net

  # Frontend (Vite + React + Nginx)
  frontend:
    build:
      context: ./erosyafrodita
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
    image: eros-front:latest
    container_name: eros-frontend
    ports:
      - "${FRONTEND_PORT:-81}:80"
    depends_on:
      - app
    networks:
      - app-net

volumes:
  db_data:
  db_usuarios_data:

networks:
  app-net:
    driver: bridge
