# Laboratorio - entorno aislado
services:
  db-lab:
    image: mysql:8.0
    container_name: tienda-mysql-lab
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: lab123456
      MYSQL_DATABASE: tienda_db_lab
    volumes:
      - db_lab_data:/var/lib/mysql
    networks:
      - lab-net
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app-lab:
    build:
      context: ./tiendaBack
      dockerfile: Dockerfile
    image: tiendaonline-lab:latest
    container_name: tienda-app-lab
    ports:
      - "8083:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-lab:3306/tienda_db_lab
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: lab123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_CLOUD_CONFIG_ENABLED: "false"
      SPRING_CLOUD_IMPORT-CHECK_ENABLED: "false"
      JWT_SECRET: ${JWT_SECRET}
      REVOLUT_API_KEY: ${REVOLUT_API_KEY}
      REVOLUT_WEBHOOK_SECRET: ${REVOLUT_WEBHOOK_SECRET:-}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    depends_on:
      db-lab:
        condition: service_healthy
    networks:
      - lab-net

  frontend-lab:
    image: nginx:alpine
    container_name: eros-frontend-lab
    ports:
      - "4002:80"
    volumes:
      - ./erosyafrodita/dist:/usr/share/nginx/html:ro
      - ./erosyafrodita/lab-assets/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app-lab
    networks:
      - lab-net

volumes:
  db_lab_data:

networks:
  lab-net:
    driver: bridge
