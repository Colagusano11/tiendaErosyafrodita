# Laboratorio - usa BD propia + servicios compartidos de producción
services:
  db-lab:
    image: mysql:8.0
    container_name: tienda-mysql-lab
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: tienda_db
    volumes:
      - db_lab_data:/var/lib/mysql
    networks:
      - lab-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app-lab:
    image: tiendaonline-lab:latest
    container_name: tienda-app-lab
    ports:
      - "8083:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-lab:3306/tienda_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_CLOUD_CONFIG_ENABLED: "false"
      SPRING_CLOUD_IMPORT-CHECK_ENABLED: "false"
    depends_on:
      db-lab:
        condition: service_healthy
    networks:
      - lab-net

  frontend-lab:
    image: nginx:alpine
    container_name: eros-frontend-lab
    ports:
      - "4002:80"
    volumes:
      - ./erosyafrodita/dist:/usr/share/nginx/html:ro
      - ./lab-assets-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app-lab
    networks:
      - lab-net

volumes:
  db_lab_data:

networks:
  lab-net:
    driver: bridge