spring.application.name=tiendaonline
server.port=8080


# ========================
# CONFIGURACION MySQL
# ========================

spring.datasource.url=${DB_URL:jdbc:mysql://db:3306/tienda_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# User MAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#RUTAS
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

spring.cloud.discovery.client.simple.instances.mcsv-usuario[0].uri=http://mcsv-usuario:8080
spring.cloud.loadbalancer.enabled=true


config.baseurl.endpoint.mcsv-usuario=http://mcsv-usuario:8080

# ========================
# PASARELAS DE PAGO
# =======================

revolut.api.key=${REVOLUT_API_KEY}
revolut.api.url=https://merchant.revolut.com/api/1.0
app.frontend.url=${FRONTEND_URL:https://erosyafrodita.com}

# ========================
# JWT (misma clave que mcsv-usuario para validar tokens)
# ========================
application.security.jwt.secret-key=${JWT_SECRET}

# ========================
# API CREDENTIALS (SUPPLIERS)
# ========================
bts.api.jwt=${BTS_API_JWT}
novaengel.user=${NOVAENGEL_USER}

# ========================
# ACTUATOR & MONITORING
# ========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.mail.enabled=false

# ========================
# AMAZON SP-API
# ========================
amazon.spapi.clientId=${AMAZON_CLIENT_ID:}
amazon.spapi.clientSecret=${AMAZON_CLIENT_SECRET:}
amazon.spapi.refreshToken=${AMAZON_REFRESH_TOKEN:}
amazon.spapi.marketplaceId=${AMAZON_MARKETPLACE_ID:A1RKKUPIHCS9HS}

# PayPal Configuration
paypal.client.id=${PAYPAL_CLIENT_ID}
paypal.secret=${PAYPAL_SECRET}
paypal.mode=${PAYPAL_MODE:sandbox}
