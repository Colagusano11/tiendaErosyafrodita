
<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Erosyafrodita - Lujo y Belleza</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Noto+Sans:wght@300;400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png"/>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2b90d",
                        "primary-hover": "#d4a00b",
                        "background-light": "#fcfbf8",
                        "background-dark": "#18181b",
                        "surface-dark": "#27272a",
                        "surface-lighter": "#3a321c",
                        "border-dark": "#3f3f46",
                        "border-gold": "#685a31",
                        "text-main": "#fcfbf8",
                        "text-secondary": "#9c8749",
                        "text-gold": "#cbbc90",
                        "text-muted": "#9ca3af",
                        "accent-pink": "#ec4899",
                        "accent-lilac": "#d8b4fe",
                        "soft-pink": "#fceeff",
                        "lavender": "#e6e6fa",
                        "charcoal": "#121212",
                        "charcoal-surface": "#1E1E1E",
                        "charcoal-lighter": "#2d2d2d",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"],
                        "serif": ["Noto Serif", "serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "1rem", 
                        "lg": "2rem", 
                        "xl": "3rem", 
                        "full": "9999px"
                    },
                    animation: {
                        "fade-in": "fadeIn 0.3s ease-out forwards",
                        "slide-right": "slideRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards",
                        "slide-left": "slideLeft 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards",
                        "scale-in": "scaleIn 0.3s ease-out forwards",
                    },
                    keyframes: {
                        fadeIn: {
                            "0%": { opacity: "0" },
                            "100%": { opacity: "1" },
                        },
                        slideRight: {
                            "0%": { transform: "translateX(-100%)" },
                            "100%": { transform: "translateX(0)" },
                        },
                        slideLeft: {
                            "0%": { transform: "translateX(100%)" },
                            "100%": { transform: "translateX(0)" },
                        },
                        scaleIn: {
                            "0%": { opacity: "0", transform: "scale(0.95)" },
                            "100%": { opacity: "1", transform: "scale(1)" },
                        },
                    },
                },
            },
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px;
            border-radius: 50%; background: #f2b90d; cursor: pointer; margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: #333; border-radius: 2px;
        }
        
        body {
            background-color: #18181b;
        }
    </style>
<script type="importmap">

    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
