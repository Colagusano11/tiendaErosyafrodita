# Rate limit zones — fuera del server block
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy       "no-referrer"   always;
    add_header Permissions-Policy    "camera=(), microphone=(), geolocation=()" always;

    # Content-Security-Policy (single-line para nginx)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com https://sandbox-merchant.revolut.com https://merchant.revolut.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.tailwindcss.com https://sandbox-merchant.revolut.com https://merchant.revolut.com; frame-src 'self' https://sandbox-merchant.revolut.com https://merchant.revolut.com; frame-ancestors 'none';" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Auth endpoints — rate limit estricto + rewrite /api → vacio
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://tienda-app-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_intercept_errors on;
        error_page 503 = @rate_limit;
    }

    location /api/auth/forgot-password {
        limit_req zone=login burst=1 nodelay;
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://tienda-app-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/auth/reset-password {
        limit_req zone=login burst=1 nodelay;
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://tienda-app-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy imagen
    location /api/proxy-image {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://tienda-app-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # API general — todas las demás rutas /api/* → backend sin prefijo /api
    location /api/ {
        limit_req zone=api_general burst=15 nodelay;
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://tienda-app-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Rate limit exceeded page
    location @rate_limit {
        return 429 '{"error": "Demasiadas solicitudes. Intenta más tarde."}';
        add_header Content-Type application/json always;
    }
}